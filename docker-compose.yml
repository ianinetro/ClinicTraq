version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: clinictraq
      POSTGRES_USER: clinictraq
      POSTGRES_PASSWORD: clinictraq_dev
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinictraq -d clinictraq"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./backend:/app
      - ./data/uploads:/app/data/uploads
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    env_file: .env
    volumes:
      - ./backend:/app
      - ./data/uploads:/app/data/uploads
    command: celery -A worker worker --loglevel=info --concurrency=4

  beat:
    build: ./backend
    restart: unless-stopped
    depends_on:
      worker:
        condition: service_started
    env_file: .env
    volumes:
      - ./backend:/app
    command: celery -A worker beat --loglevel=info --scheduler redbeat.RedBeatScheduler

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev -- --host
